<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll To Top Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #efffe8;
      color: #111820;
      font-family: "Outfit", sans-serif;
      padding: 24px 20px 120px;
    }

    .intro {
      text-align: center;
      margin-bottom: 24px;
    }

    .eyebrow {
      color: #4a5a55;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 0;
      font-size: clamp(2.2rem, 8vw, 3.8rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
    }

    p {
      width: min(100%, 520px);
      margin: 14px auto 0;
      color: #4a5a55;
      line-height: 1.65;
    }

    .stack {
      display: grid;
      gap: 14px;
      max-width: 420px;
      margin: 0 auto;
    }

    .stack-card {
      min-height: 130px;
      padding: 20px;
      border-radius: 24px;
      border: 1px solid rgba(17, 24, 32, 0.08);
      background: rgba(255, 255, 255, 0.74);
      display: flex;
      align-items: flex-end;
      color: #111820;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <section class="intro">
    <div class="eyebrow">Scroll Demo</div>
    <h1>Keep going down.</h1>
    <p>Once the page scrolls enough, the floating button appears and brings you back to the top.</p>
  </section>

  <section class="stack">
    <div class="stack-card">Section one</div>
    <div class="stack-card">Section two</div>
    <div class="stack-card">Section three</div>
    <div class="stack-card">Section four</div>
    <div class="stack-card">Section five</div>
  </section>

  <!-- SNIPPET:start -->
  <style>
    .snc-scroll-top {
      position: fixed;
      right: 1.5rem;
      bottom: 1.5rem;
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #28ff0d, #28ff0d);
      color: #0171d3;
      font-size: 1.1rem;
      box-shadow: 0 0 30px rgba(40, 255, 13, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .snc-scroll-top.is-visible {
      opacity: 1;
      pointer-events: auto;
    }
  </style>

  <button class="snc-scroll-top" id="sncScrollTop" aria-label="Scroll to top">↑</button>

  <script>
    const sncScrollTop = document.getElementById("sncScrollTop");

    window.addEventListener("scroll", () => {
      sncScrollTop.classList.toggle("is-visible", window.scrollY > 240);
    });

    sncScrollTop.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>
  <!-- SNIPPET:end -->
</body>
</html>
