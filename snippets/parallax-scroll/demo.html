<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Scroll Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(255, 122, 134, 0.16), transparent 18%),
        linear-gradient(180deg, #0f1218 0%, #07090d 100%);
      color: #ffffff;
      font-family: "Outfit", sans-serif;
    }

    .intro,
    .outro {
      padding: 72px 20px;
      text-align: center;
    }

    .eyebrow {
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 0;
      font-size: clamp(2.2rem, 8vw, 4rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
    }

    p {
      width: min(100%, 540px);
      margin: 14px auto 0;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.65;
    }

    .outro {
      padding-bottom: 120px;
    }
  </style>
</head>
<body>
  <section class="intro">
    <div class="eyebrow">Parallax Demo</div>
    <h1>Scroll for depth.</h1>
    <p>The motion lives in the background layers, so the layout still stays clean.</p>
  </section>

  <!-- SNIPPET:start -->
  <style>
    .snc-parallax {
      position: relative;
      min-height: 360px;
      overflow: hidden;
      border-radius: 24px;
      background: #0d1016;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 20px;
    }

    .snc-parallax-bg {
      position: absolute;
      inset: -12%;
      border-radius: 24px;
      will-change: transform;
    }

    .snc-parallax-bg[data-speed="0.28"] {
      background:
        radial-gradient(circle at 30% 35%, rgba(255, 122, 134, 0.5), transparent 28%),
        linear-gradient(135deg, #151927, #090b11);
    }

    .snc-parallax-bg[data-speed="0.14"] {
      background:
        radial-gradient(circle at 70% 45%, rgba(255, 255, 255, 0.12), transparent 24%),
        radial-gradient(circle at 60% 70%, rgba(255, 122, 134, 0.16), transparent 22%);
      mix-blend-mode: screen;
    }

    .snc-parallax-copy {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #ffffff;
      padding: 20px;
    }

    .snc-parallax-copy p {
      margin-bottom: 0.5rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
    }

    .snc-parallax-copy h2 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }
  </style>

  <section class="snc-parallax">
    <div class="snc-parallax-bg" data-speed="0.28"></div>
    <div class="snc-parallax-bg" data-speed="0.14"></div>
    <div class="snc-parallax-copy">
      <p>Scroll the page</p>
      <h2>Soft red depth</h2>
    </div>
  </section>

  <script>
    window.addEventListener("scroll", () => {
      const scrollTop = window.pageYOffset;
      document.querySelectorAll(".snc-parallax-bg").forEach((layer) => {
        const speed = Number(layer.dataset.speed || 0.2);
        layer.style.transform = "translateY(" + scrollTop * speed + "px)";
      });
    });
  </script>
  <!-- SNIPPET:end -->

  <section class="outro">
    <p>Keep scrolling so you can see the layers move at different speeds inside the frame.</p>
  </section>
</body>
</html>
