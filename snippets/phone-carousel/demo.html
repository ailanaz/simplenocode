<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Phone Carousel Demo</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,rgba(26,102,64,.14),transparent 28%),linear-gradient(180deg,#f9fafb,#eef7f0);font-family:Outfit,sans-serif;color:#111820;padding:40px 24px;display:flex;flex-direction:column;align-items:center}.demo-intro{max-width:500px;text-align:center;margin-bottom:20px}.eyebrow{color:#4a5a55;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase}h1{margin:10px 0 0;font-size:clamp(1.8rem,6vw,2.6rem);line-height:.98;letter-spacing:-.05em}p{margin:10px 0 0;color:#4a5a55;line-height:1.65;font-size:.95rem}.snc-phones-wrap{position:relative;width:100%;max-width:700px;overflow:hidden;padding:32px 0 24px}.snc-phones-track{display:flex;gap:16px;align-items:center;transition:transform .45s cubic-bezier(.4,0,.2,1);will-change:transform}.snc-phone-item{flex:0 0 220px;display:flex;flex-direction:column;align-items:center;transition:transform .4s ease,opacity .4s ease;transform:scale(.82);opacity:.55;cursor:pointer}.snc-phone-item.is-center{transform:scale(1);opacity:1;cursor:default}.snc-phone-frame{width:200px;height:380px;border-radius:36px;border:5px solid #1a6640;overflow:hidden;background:#eaf2ee;box-shadow:0 20px 60px rgba(26,102,64,.15);position:relative}.snc-phone-screen{width:100%;height:100%;object-fit:cover;display:block}.snc-phone-notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:64px;height:20px;background:#1a6640;border-radius:999px;z-index:2}.snc-phones-btn{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:999px;border:1px solid rgba(26,102,64,.2);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;z-index:10;color:#1a6640;transition:background .18s,color .18s,border-color .18s}.snc-phones-btn:hover{background:#1a6640;color:#fff;border-color:#1a6640}.snc-phones-prev{left:8px}.snc-phones-next{right:8px}</style></head><body><div class="demo-intro"><div class="eyebrow">Carousel Demo</div><h1>App showcase.</h1><p>Click a side phone or use the arrows to bring it to center.</p></div><div class="snc-phones-wrap" id="sncPhonesWrap"><button class="snc-phones-btn snc-phones-prev" id="sncPhonesPrev">&#8592;</button><div class="snc-phones-track" id="sncPhonesTrack"><div class="snc-phone-item" data-phone-index="0"><div class="snc-phone-frame"><div class="snc-phone-notch"></div><img class="snc-phone-screen" src="https://placehold.co/400x750/1a6640/fff?text=App+One" alt="App One"></div></div><div class="snc-phone-item" data-phone-index="1"><div class="snc-phone-frame"><div class="snc-phone-notch"></div><img class="snc-phone-screen" src="https://placehold.co/400x750/0f4a2c/fff?text=Swipe" alt="Swipe"></div></div><div class="snc-phone-item" data-phone-index="2"><div class="snc-phone-frame"><div class="snc-phone-notch"></div><img class="snc-phone-screen" src="https://placehold.co/400x750/5aaf82/fff?text=App+Three" alt="App Three"></div></div></div><button class="snc-phones-btn snc-phones-next" id="sncPhonesNext">&#8594;</button></div><script>(function(){var track=document.getElementById('sncPhonesTrack');var prev=document.getElementById('sncPhonesPrev');var next=document.getElementById('sncPhonesNext');if(!track)return;var items=Array.from(track.querySelectorAll('.snc-phone-item'));var total=items.length,center=Math.floor(total/2),SLOT=236;function update(){var offset=center*SLOT+SLOT/2;track.style.transform='translateX(calc(50% - '+offset+'px))';items.forEach(function(item,i){item.classList.toggle('is-center',i===center);});}function go(dir){center=(center+dir+total)%total;update();}items.forEach(function(item,i){item.addEventListener('click',function(){if(i===center)return;center=i;update();});});if(prev)prev.addEventListener('click',function(){go(-1);});if(next)next.addEventListener('click',function(){go(1);});update();})();</script></body></html>
