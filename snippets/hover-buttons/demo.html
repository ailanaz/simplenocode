<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Button Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #efffe8;
      color: #111820;
      font-family: "Outfit", sans-serif;
    }

    .demo-shell {
      width: min(100%, 420px);
      padding: 26px;
      border-radius: 28px;
      border: 1px solid rgba(17, 24, 32, 0.08);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 36px rgba(17, 24, 32, 0.08);
      text-align: center;
    }

    .eyebrow {
      color: #4a5a55;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 0;
      font-size: clamp(2rem, 8vw, 3.1rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    p {
      margin: 12px 0 24px;
      color: #4a5a55;
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <main class="demo-shell">
    <div class="eyebrow">Button Demo</div>
    <h1>Soft neon CTA.</h1>
    <p>Hover the button to see the lift and glow effect.</p>

    <!-- SNIPPET:start -->
    <style>
      .snc-glow-btn {
        border: 2px solid #18a13a;
        border-radius: 14px;
        padding: 1rem 1.5rem;
        background: #ffffff;
        color: #128a31;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        box-shadow:
          0 8px 18px rgba(24, 161, 58, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.85);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .snc-glow-btn:hover {
        transform: translateY(-4px);
        box-shadow:
          0 18px 32px rgba(24, 161, 58, 0.18),
          0 0 0 4px rgba(31, 212, 74, 0.12),
          0 0 34px rgba(31, 212, 74, 0.3);
      }
    </style>

    <button class="snc-glow-btn">Hover Me</button>
    <!-- SNIPPET:end -->
  </main>
</body>
</html>
