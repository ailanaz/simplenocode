<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services Grid Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #fafafa;
      font-family: "Outfit", sans-serif;
      color: #111820;
      display: flex;
      flex-direction: column;
    }
    .demo-intro {
      max-width: 480px;
      padding: 40px 24px 20px;
      text-align: center;
      margin: 0 auto;
    }
    .eyebrow {
      color: #4a5a55;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    h1 {
      margin: 10px 0 0;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }
    p {
      margin: 10px 0 0;
      color: #4a5a55;
      line-height: 1.65;
      font-size: 0.95rem;
    }
    .services {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }
    .service-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
    }
    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
    }
    .service-thumb {
      aspect-ratio: 16 / 10;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .service-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }
    .service-card:hover .service-thumb img {
      transform: scale(1.05);
    }
    .service-content {
      padding: 1.5rem;
    }
    .service-content h3 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .service-content p {
      color: #666;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="demo-intro">
    <div class="eyebrow">Services Demo</div>
    <h1>2-column grid cards.</h1>
    <p>Screenshot thumbnails that lift on hover with smooth transitions.</p>
  </div>

  <div class="services">
    <div class="services-grid">
      <div class="service-card">
        <div class="service-thumb"></div>
        <div class="service-content">
          <h3>Web Development</h3>
          <p>Custom websites built with modern technologies.</p>
        </div>
      </div>
      <div class="service-card">
        <div class="service-thumb"></div>
        <div class="service-content">
          <h3>Mobile Apps</h3>
          <p>Native and cross-platform apps for iOS and Android.</p>
        </div>
      </div>
      <div class="service-card">
        <div class="service-thumb"></div>
        <div class="service-content">
          <h3>UI/UX Design</h3>
          <p>User-centered design that looks great.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
