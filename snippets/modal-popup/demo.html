<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Popup Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #efffe8;
      color: #ffffff;
      font-family: "Outfit", sans-serif;
    }

    .demo-shell {
      width: min(100%, 420px);
      padding: 26px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #111820;
      text-align: center;
    }

    .eyebrow {
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 0;
      font-size: clamp(2rem, 8vw, 3.1rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    p {
      margin: 12px 0 24px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <main class="demo-shell">
    <div class="eyebrow">Modal Demo</div>
    <h1>Overlay content.</h1>
    <p>Open the modal to preview a lightweight pop-up pattern.</p>

    <!-- SNIPPET:start -->
    <style>
      .snc-modal-trigger,
      .snc-modal-close {
        border: 0;
        border-radius: 14px;
        padding: 0.95rem 1.35rem;
        background: linear-gradient(135deg, #28ff0d, #28ff0d);
        color: #0171d3;
        font-weight: 700;
      }

      .snc-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: rgba(5, 6, 10, 0.78);
        z-index: 9998;
      }

      .snc-modal.is-open {
        display: flex;
      }

      .snc-modal-card {
        width: min(100%, 360px);
        border-radius: 20px;
        padding: 1.25rem;
        background: #11131a;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #ffffff;
        box-shadow: 0 26px 60px rgba(0, 0, 0, 0.35);
        text-align: left;
      }

      .snc-modal-card h2 {
        margin-bottom: 0.6rem;
      }

      .snc-modal-card p {
        margin-bottom: 1rem;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.6;
      }
    </style>

    <button class="snc-modal-trigger" id="openSnippetModal">Open Modal</button>

    <div class="snc-modal" id="sncModal">
      <div class="snc-modal-card">
        <h2>Modal title</h2>
        <p>Drop any short form, message, or content block inside this panel.</p>
        <button class="snc-modal-close" id="closeSnippetModal">Close</button>
      </div>
    </div>

    <script>
      const sncModal = document.getElementById("sncModal");

      document.getElementById("openSnippetModal").addEventListener("click", () => {
        sncModal.classList.add("is-open");
      });

      document.getElementById("closeSnippetModal").addEventListener("click", () => {
        sncModal.classList.remove("is-open");
      });

      sncModal.addEventListener("click", (event) => {
        if (event.target === sncModal) {
          sncModal.classList.remove("is-open");
        }
      });
    </script>
    <!-- SNIPPET:end -->
  </main>
</body>
</html>
