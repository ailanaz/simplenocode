<!-- ADD TO YOUR <head> (or <style>) -->
<style>
.cursor {
  width: 30px;
  height: 30px;
  border: 2px solid #fff;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.1s ease-out, width 0.2s, height 0.2s, background 0.2s;
  mix-blend-mode: difference;
}

.cursor.hover {
  width: 50px;
  height: 50px;
  background: rgba(255,255,255,0.15);
}

/* Hide default cursor on interactive elements */
a, button, .hover-target { cursor: none; }
body { cursor: none; }
</style>


<!-- ADD TO YOUR <body> (before closing </body>) -->
<div class="cursor" id="cursor"></div>


<!-- ADD TO YOUR <script> (before closing </script>) -->
<script>
const cursor = document.getElementById('cursor');
let mouseX = 0, mouseY = 0;
let cursorX = 0, cursorY = 0;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animate() {
  cursorX += (mouseX - cursorX) * 0.15;
  cursorY += (mouseY - cursorY) * 0.15;
  cursor.style.left = cursorX + 'px';
  cursor.style.top = cursorY + 'px';
  requestAnimationFrame(animate);
}
animate();

document.querySelectorAll('a, button, .hover-target').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
});
</script>
