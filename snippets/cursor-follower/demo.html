<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Follower Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at top, rgba(40, 255, 13, 0.18), transparent 28%),
        linear-gradient(180deg, #10131a 0%, #090b10 100%);
      color: #ffffff;
      font-family: "Outfit", sans-serif;
    }

    .demo-shell {
      width: min(100%, 420px);
      padding: 24px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    .eyebrow {
      margin-bottom: 10px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3.2rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    p {
      margin: 12px 0 0;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.65;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 22px;
    }

    .actions button,
    .actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1.2rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="demo-shell">
    <div class="eyebrow">Cursor Demo</div>
    <h1>Move through the frame.</h1>
    <p>Hover the sample controls below to see the follower expand.</p>
    <div class="actions">
      <button type="button" data-cursor-hover>Hover button</button>
      <a href="#" data-cursor-hover>Hover link</a>
    </div>
  </main>

  <!-- SNIPPET:start -->
  <style>
    .snc-cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 26px;
      height: 26px;
      border: 1.5px solid #28ff0d;
      border-radius: 999px;
      background: rgba(40, 255, 13, 0.18);
      box-shadow: 0 0 28px rgba(40, 255, 13, 0.35);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s ease, height 0.2s ease, background 0.2s ease;
    }

    .snc-cursor.is-hover {
      width: 44px;
      height: 44px;
      background: rgba(40, 255, 13, 0.28);
    }

    html,
    body,
    a,
    button {
      cursor: none;
    }
  </style>

  <div class="snc-cursor" id="sncCursor"></div>

  <script>
    const sncCursor = document.getElementById("sncCursor");
    let sncX = window.innerWidth / 2;
    let sncY = window.innerHeight / 2;
    let sncCurrentX = sncX;
    let sncCurrentY = sncY;

    window.addEventListener("mousemove", (event) => {
      sncX = event.clientX;
      sncY = event.clientY;
    });

    function renderCursor() {
      sncCurrentX += (sncX - sncCurrentX) * 0.16;
      sncCurrentY += (sncY - sncCurrentY) * 0.16;
      sncCursor.style.left = sncCurrentX + "px";
      sncCursor.style.top = sncCurrentY + "px";
      requestAnimationFrame(renderCursor);
    }

    renderCursor();

    document.querySelectorAll("a, button, [data-cursor-hover]").forEach((element) => {
      element.addEventListener("mouseenter", () => sncCursor.classList.add("is-hover"));
      element.addEventListener("mouseleave", () => sncCursor.classList.remove("is-hover"));
    });
  </script>
  <!-- SNIPPET:end -->
</body>
</html>
