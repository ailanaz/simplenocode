<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Reveal Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(40, 255, 13, 0.18), transparent 28%),
        linear-gradient(180deg, #10131a 0%, #090b10 100%);
      color: #ffffff;
      font-family: "Outfit", sans-serif;
    }

    .demo-shell {
      width: min(100%, 460px);
      padding: 26px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      text-align: center;
    }

    .eyebrow {
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    p {
      margin: 12px 0 24px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <main class="demo-shell">
    <div class="eyebrow">Text Reveal Demo</div>
    <p>The reveal runs as soon as the text enters the viewport.</p>

    <!-- SNIPPET:start -->
    <style>
      .snc-reveal {
        opacity: 0;
        transform: translateY(28px);
        transition: opacity 0.7s ease, transform 0.7s ease;
        font-size: clamp(1.8rem, 5vw, 3rem);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.05em;
        color: #ffffff;
      }

      .snc-reveal.is-visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>

    <div class="snc-reveal" id="sncReveal">Hello, this text just slid into view.</div>

    <script>
      const sncReveal = document.getElementById("sncReveal");
      const sncObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            sncObserver.unobserve(entry.target);
          }
        });
      });

      sncObserver.observe(sncReveal);
    </script>
    <!-- SNIPPET:end -->
  </main>
</body>
</html>
