<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Reveal — SimpleNoCode</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    h1 {
      color: #fff;
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    
    p {
      color: #666;
      font-size: 1.25rem;
    }
    
    .spacer { height: 50vh; }
  </style>
</head>
<body style="padding: 2rem;">
  <h1 class="reveal">Hello, World</h1>
  <p class="reveal">This text fades in and slides up.</p>
  <p class="reveal">Scroll down for more.</p>
  
  <div class="spacer"></div>
  
  <h1 class="reveal">More Content</h1>
  <p class="reveal">This also animates when it enters the viewport.</p>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
