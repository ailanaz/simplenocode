<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Dock Nav Demo</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; background: radial-gradient(circle at top, rgba(26,102,64,0.14), transparent 28%), linear-gradient(180deg, #f9fafb, #eef7f0); font-family: "Outfit", sans-serif; color: #111820; padding: 40px 24px 120px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.demo-card { width: min(100%,460px); padding: 32px; border-radius: 20px; background: #fff; border: 1px solid rgba(26,102,64,0.1); text-align: center; }
.eyebrow { color: #4a5a55; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; }
h1 { margin: 10px 0 0; font-size: clamp(1.8rem, 6vw, 2.6rem); line-height: 0.98; letter-spacing: -0.05em; }
p { margin: 10px 0 0; color: #4a5a55; line-height: 1.65; font-size: 0.95rem; }
.snc-dock { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 999; display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.08); border-radius: 999px; padding: 10px 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
.snc-dock-link { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 999px; color: #555; text-decoration: none; transition: background 0.18s, color 0.18s; }
.snc-dock-link:hover, .snc-dock-link.is-active { background: rgba(26,102,64,0.1); color: #1a6640; }
.snc-dock-link svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.snc-dock-cta { margin-left: 6px; padding: 12px 22px; border-radius: 999px; background: #1a6640; color: #fff; font-size: 0.86rem; font-weight: 700; text-decoration: none; letter-spacing: 0.02em; border: 2px solid #1a6640; transition: background 0.18s, color 0.18s; }
.snc-dock-cta:hover { background: #fff; color: #1a6640; }
</style></head>
<body>
<div class="demo-card"><div class="eyebrow">Dock Nav Demo</div><h1>Float it.</h1><p>Fixed pill nav at the bottom. Hover icons and the CTA to see the invert effect.</p></div>
<nav class="snc-dock" aria-label="Site navigation">
  <a href="#" class="snc-dock-link is-active" aria-label="Home"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg></a>
  <a href="#" class="snc-dock-link" aria-label="Services"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 19.07a10 10 0 010-14.14"/></svg></a>
  <a href="#" class="snc-dock-link" aria-label="Work"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg></a>
  <a href="#" class="snc-dock-link" aria-label="Contact"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></a>
  <a href="#" class="snc-dock-cta">Get Started</a>
</nav>
</body></html>
