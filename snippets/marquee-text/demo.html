<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marquee Text Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(255, 122, 134, 0.18), transparent 28%),
        linear-gradient(180deg, #10131a 0%, #090b10 100%);
      color: #ffffff;
      font-family: "Outfit", sans-serif;
    }

    .demo-shell {
      width: min(100%, 620px);
      padding: 26px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      text-align: center;
    }

    .eyebrow {
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 0;
      font-size: clamp(2rem, 8vw, 3.2rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    p {
      margin: 12px 0 24px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <main class="demo-shell">
    <div class="eyebrow">Marquee Demo</div>
    <h1>Continuous motion.</h1>
    <p>Use a loop like this to keep launches, keywords, or sections feeling active.</p>

    <!-- SNIPPET:start -->
    <style>
      .snc-marquee {
        overflow: hidden;
        border-radius: 16px;
        background: #0f1117;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 1rem 0;
      }

      .snc-marquee-track {
        display: flex;
        gap: 1.25rem;
        width: max-content;
        white-space: nowrap;
        animation: snc-marquee 16s linear infinite;
      }

      .snc-marquee-track span {
        font-size: clamp(1rem, 2vw, 1.4rem);
        font-weight: 700;
        letter-spacing: 0.12em;
        color: #ff7a86;
      }

      @keyframes snc-marquee {
        to {
          transform: translateX(-50%);
        }
      }
    </style>

    <div class="snc-marquee">
      <div class="snc-marquee-track">
        <span>DESIGN</span>
        <span>BUILD</span>
        <span>LAUNCH</span>
        <span>DESIGN</span>
        <span>BUILD</span>
        <span>LAUNCH</span>
      </div>
    </div>
    <!-- SNIPPET:end -->
  </main>
</body>
</html>
