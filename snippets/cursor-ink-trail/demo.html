<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor Ink Trail Demo</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #efffe8; font-family: "Outfit", sans-serif; color: #111820; }
.demo-shell { width: min(100%, 420px); padding: 26px; border-radius: 24px; border: 1px solid rgba(26,102,64,0.12); background: #fff; text-align: center; }
.eyebrow { color: #4a5a55; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; }
h1 { margin: 10px 0 0; font-size: clamp(1.8rem, 6vw, 2.6rem); line-height: 0.98; letter-spacing: -0.05em; }
p { margin: 10px 0 16px; color: #4a5a55; line-height: 1.65; font-size: 0.95rem; }
</style></head>
<body>
<main class="demo-shell">
  <div class="eyebrow">Cursor Demo</div>
  <h1>Ink trail.</h1>
  <p>Move your cursor around the page to see the smooth ink stroke follow.</p>
</main>
<style>#snc-cursor-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }</style>
<canvas id="snc-cursor-canvas"></canvas>
<script>
(function() {
  var canvas = document.getElementById('snc-cursor-canvas');
  if (!canvas) return;
  if (!window.matchMedia('(pointer: fine)').matches) return;
  var ctx = canvas.getContext('2d');
  var trail = [], cursor = {x:-1000,y:-1000}, smoothed = {x:-1000,y:-1000};
  var lastMove = 0, lastTick = 0, trailMax = 15, smoothing = 0.22, idleFadeAfter = 20, strokeWidth = 2.5;
  var dpr = window.devicePixelRatio || 1;
  function lerp(a,b,t){return a+(b-a)*t;}
  function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
  function resize(){
    canvas.width=window.innerWidth*dpr; canvas.height=window.innerHeight*dpr;
    canvas.style.width=window.innerWidth+'px'; canvas.style.height=window.innerHeight+'px';
    ctx.scale(dpr,dpr);
  }
  window.addEventListener('mousemove',function(e){cursor.x=e.clientX;cursor.y=e.clientY;lastMove=Date.now();},{passive:true});
  window.addEventListener('resize',resize); resize();
  function tick(){
    var now=Date.now(); var dt=Math.min((now-lastTick)/1000,0.1); lastTick=now;
    var lf=1-Math.pow(smoothing,60*dt);
    smoothed.x=lerp(smoothed.x,cursor.x,lf); smoothed.y=lerp(smoothed.y,cursor.y,lf);
    if(trail.length===0||dist(smoothed,trail[trail.length-1])>1.2){
      trail.push({x:smoothed.x,y:smoothed.y}); if(trail.length>trailMax)trail.shift();
    }
    var idle=(now-lastMove)>idleFadeAfter;
    if(idle&&trail.length>0){
      trail.forEach(function(p){p.o=(p.o===undefined?1:p.o)*0.88;});
      trail=trail.filter(function(p){return(p.o===undefined?1:p.o)>0.03;});
    }
    ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
    if(trail.length>=2){
      ctx.lineWidth=strokeWidth; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(trail[0].x,trail[0].y);
      for(var i=1;i<trail.length;i++){var p0=trail[i-1],p1=trail[i];ctx.quadraticCurveTo(p0.x,p0.y,p1.x,p1.y);}
      var op=idle&&trail[0].o!==undefined?trail[0].o:1;
      ctx.strokeStyle='rgba(26,102,64,'+Math.max(0.05,op*0.9)+')'; ctx.stroke();
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
</body></html>
