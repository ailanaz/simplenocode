<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Spinner Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #efffe8;
      color: #ffffff;
      font-family: "Outfit", sans-serif;
    }

    .demo-shell {
      width: min(100%, 380px);
      padding: 26px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #111820;
      text-align: center;
    }

    .eyebrow {
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 0;
      font-size: clamp(2rem, 8vw, 3rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    p {
      margin: 12px 0 24px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <main class="demo-shell">
    <div class="eyebrow">Loading Demo</div>
    <h1>Waiting state.</h1>
    <p>Use this when your page needs a calmer placeholder while something loads.</p>

    <!-- SNIPPET:start -->
    <style>
      .snc-spinner-wrap {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 0.9rem;
      }

      .snc-spinner {
        width: 50px;
        height: 50px;
        border-radius: 999px;
        border: 4px solid rgba(255, 255, 255, 0.12);
        border-top-color: #28ff0d;
        animation: snc-spin 1s linear infinite;
      }

      .snc-spinner-label {
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.8rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      @keyframes snc-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <div class="snc-spinner-wrap">
      <div class="snc-spinner"></div>
      <span class="snc-spinner-label">Loading</span>
    </div>
    <!-- SNIPPET:end -->
  </main>
</body>
</html>
