<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Spinner — SimpleNoCode</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      flex-wrap: wrap;
    }
    
    .spinner1 {
      width: 50px;
      height: 50px;
      border: 3px solid #222;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .spinner2 {
      width: 50px;
      height: 50px;
      border: 3px solid transparent;
      border-top-color: #f472b6;
      border-right-color: #f472b6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    .spinner3 {
      width: 50px;
      height: 50px;
      border: 3px solid #222;
      border-radius: 50%;
      position: relative;
    }
    
    .spinner3::before {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      border: 3px solid transparent;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }
    
    .loading-text {
      color: #666;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div style="text-align: center;">
    <div class="spinner1"></div>
    <div class="loading-text">Basic</div>
  </div>
  
  <div style="text-align: center;">
    <div class="spinner2"></div>
    <div class="loading-text">Double</div>
  </div>
  
  <div style="text-align: center;">
    <div class="spinner3"></div>
    <div class="loading-text">Pulse</div>
  </div>
</body>
</html>
