<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimpleNoCode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a href="/" class="brand"><img src="./logo-image.png" alt="SimpleNoCode" class="brand-logo"></a>
      <p class="topbar-copy">preview, test, and copy snippets in one workspace</p>
      <div class="topbar-actions">
        <div class="topbar-count" id="snippetCount">0 snippets</div>
        <button class="topbar-button" id="randomSnippetBtn" type="button">Random Snippet</button>
      </div>
    </header>

    <main class="library">
      <div class="section-heading">
        <div>
          <div class="eyebrow">No Code Copy Library</div>
          <h2>Preview Lab</h2>
        </div>
        <p class="section-meta" id="filterMeta">Showing all snippets</p>
      </div>
      <div class="chip-filters" id="filters"></div>
      <section class="cards-grid" id="cardsGrid" aria-live="polite"></section>
    </main>
  </div>

  <div class="map-float" id="mapFloatPanel">
    <div class="map-float-header" id="mapFloatHeader">
      <span>Snippet Rotation</span>
      <span id="mapFloatToggle">&#9650;</span>
    </div>
    <div class="map-float-body" id="mapFloatBody">
      <div class="rotation-frame-wrap">
        <div class="rotation-copy">
          <div class="rotation-kicker">Auto Rotate</div>
          <strong id="rotationTitle">Cursor Follower</strong>
          <p id="rotationUse">A soft neon orb trails the pointer and grows over links or buttons.</p>
        </div>
      </div>
      <div class="rotation-footer">
        <div class="rotation-dots" id="rotationDots"></div>
        <button class="ghost-button small" id="rotationSelectBtn" type="button">Open Card</button>
      </div>
    </div>
  </div>

  <template id="cardTemplate">
    <article class="snippet-card">
      <div class="card-thumb">
        <div class="card-thumb-inner" data-role="thumb"></div>
      </div>
      <div class="card-body">
        <div class="card-topline">
          <span class="chip" data-role="type-chip"></span>
          <span class="card-tag" data-role="copy-size"></span>
        </div>
        <h3 data-role="title"></h3>
        <p class="card-summary" data-role="summary"></p>
        <div class="card-actions">
          <button class="action-button secondary" data-role="load-btn" type="button">Open Card</button>
          <button class="ghost-button small" data-role="copy-btn" type="button">Copy</button>
        </div>
      </div>
      <div class="card-expanded" data-role="expanded">
        <div class="card-expanded-grid">
          <div class="card-preview-panel">
            <div class="panel-bar card-panel-bar">
              <div>
                <div class="panel-label">Preview And Test</div>
                <p class="panel-caption">Interact with the live snippet directly inside this card.</p>
              </div>
            </div>
            <div class="card-preview-stage">
              <iframe data-role="preview-frame" title="Snippet preview sandbox" loading="lazy"></iframe>
            </div>
          </div>
          <div class="card-side-stack">
            <div class="card-code-panel">
              <div class="panel-bar card-panel-bar">
                <div>
                  <div class="panel-label">Copy Ready Code</div>
                  <p class="panel-caption" data-role="code-caption">Load a snippet to see its HTML, CSS, and JavaScript.</p>
                </div>
                <button class="action-button" data-role="copy-expanded-btn" type="button">Copy Code</button>
              </div>
              <pre class="card-code-block"><code data-role="code-block"></code></pre>
            </div>
            <div class="info-card card-info-panel">
              <div class="detail-block">
                <div class="panel-label">Snippet Description</div>
                <p class="info-copy" data-role="description"></p>
              </div>
              <div class="detail-block">
                <div class="panel-label">How To Paste</div>
                <ol class="usage-list" data-role="usage-list"></ol>
              </div>
              <div class="detail-block">
                <div class="panel-label">Works Best For</div>
                <p class="info-copy accent-copy" data-role="best-for"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
