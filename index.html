<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SimpleNoCode – Interactive Snippet Library</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
/* ── COLORS ───────────────────────────────────────────────────── */
:root{
  --bg:#FAF5F5;            /* Light cream background */
  --accent:#D72631;          /* Bold red (primary) */
  --accent‑2:#E5655E;        /* Lighter red for hover */
  --card:#FFFFFF;            /* Card background */
  --border:#E2D7D7;
  --text:#1A1A1A;
  --text‑light:#5A5A5A;
}

/* ── BASIC RESET ─────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}

/* ── HEADER & NAV BUBBLES ─────────────────────────────────────── */
header{
  padding:1rem 2rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid var(--border);
}
.logo{font-size:1.6rem;font-weight:800;color:var(--text);text-decoration:none}
.logo span{color:var(--accent)}
.nav-bubbles{
  display:flex;
  gap:0.5rem;
}
.bubble{
  padding:0.4rem 0.9rem;
  border:2px solid var(--border);
  border-radius:30px;
  font-size:0.85rem;
  cursor:pointer;
  transition:all .2s;
}
.bubble.active,
.bubble:hover{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

/* ── MAIN GRID ───────────────────────────────────────────────── */
.main{
  display:grid;
  grid-template-columns:1fr 2fr 2fr;
  gap:1rem;
  max-width:1400px;
  margin:2rem auto;
  padding:0 1rem;
}

/* ── LEFT – CARD LIST ─────────────────────────────────────────── */
.cards{
  display:flex;
  flex-direction:column;
  gap:1rem;
  overflow-y:auto;
  max-height:80vh;
}
.card{
  background:var(--card);
  border:2px solid var(--border);
  border-radius:12px;
  cursor:pointer;
  transition:transform .2s,border-color .2s;
}
.card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
}
.card img{width:100%;border-top-left-radius:12px;border-top-right-radius:12px}
.card .info{
  padding:0.8rem;
}
.card .info h3{font-size:1rem;margin-bottom:0.3rem}
.card .info .tag{
  display:inline-block;
  font-size:0.7rem;
  background:var(--accent‑2);
  color:#fff;
  padding:0.2rem 0.5rem;
  border-radius:6px;
}

/* ── MIDDLE – LIVE PREVIEW ─────────────────────────────────────── */
.preview{
  border:2px solid var(--border);
  border-radius:12px;
  background:#FFF;
  overflow:hidden;
  position:relative;
}
.preview iframe{
  width:100%;
  height:100%;
  border:none;
}

/* ── RIGHT – CODE & DESCRIPTION ─────────────────────────────────── */
.right{
  display:flex;
  flex-direction:column;
  gap:1rem;
}
.code-box{
  background:var(--card);
  border:2px solid var(--border);
  border-radius:12px;
  overflow:auto;
  position:relative;
}
.code-box pre{
  margin:0;
  padding:0.9rem;
  font-family:'Space Mono',monospace;
  font-size:0.85rem;
  line-height:1.4;
}
.copy-btn{
  position:absolute;
  top:6px;
  right:6px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:4px;
  padding:0.4rem 0.8rem;
  cursor:pointer;
}

/* description panel */
.desc{
  background:var(--card);
  border:2px solid var(--border);
  border-radius:12px;
  padding:1rem;
}

/* ── LOWER‑RIGHT MAP / CAROUSEL ─────────────────────────────────── */
.map{
  position:fixed;
  bottom:1rem;
  right:1rem;
  width:280px;
  height:180px;
  border:2px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}
.map img{
  width:100%;
  height:100%;
  object-fit:cover;
  animation:rotate 12s linear infinite;
}
@keyframes rotate{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* ── RESPONSIVE ───────────────────────────────────────────────── */
@media(max-width:900px){
  .main{grid-template-columns:1fr;grid-template-rows:auto auto auto}
}
@media(max-width:600px){
  header{flex-direction:column;gap:0.5rem}
}
</style>
</head>
<body>

<header>
  <a href="#" class="logo">Simple<span>NoCode</span></a>
  <div class="nav-bubbles">
    <div class="bubble active" data-cat="all">All</div>
    <div class="bubble" data-cat="cursor">Cursor</div>
    <div class="bubble" data-cat="text">Text</div>
    <div class="bubble" data-cat="scroll">Scroll</div>
    <div class="bubble" data-cat="buttons">Buttons</div>
    <div class="bubble" data-cat="loaders">Loaders</div>
    <div class="bubble" data-cat="ui">UI</div>
  </div>
</header>

<div class="main">
  <!-- LEFT – CARD LIST -->
  <div class="cards" id="cardList"></div>

  <!-- MIDDLE – LIVE PREVIEW -->
  <div class="preview" id="previewPane">
    <!-- We'll load the demo via an <iframe> -->
    <iframe id="demoFrame" src=""></iframe>
  </div>

  <!-- RIGHT – CODE + DESCRIPTION -->
  <div class="right">
    <div class="code-box">
      <button class="copy-btn" onclick="copyCode()">Copy</button>
      <pre id="codeBlock"></pre>
    </div>
    <div class="desc" id="descBox"></div>
  </div>
</div>

<!-- LOWER‑RIGHT MAP / ROTATING CAROUSEL -->
<div class="map" id="mapCarousel">
  <img id="carouselImg" src="" alt="Snippets rotation">
</div>

<script>
/* --------------------------------------------------------------
   1️⃣  DATA – add all of your snippets here.
   ------------------------------------------------------------ */
const snippets = [
  {
    id:'cursor-follower',
    title:'Cursor Follower',
    category:'cursor',
    thumb:'https://raw.githubusercontent.com/ailanaz/simplenocode/main/snippets/cursor-follower/demo.html',
    demo:'snippets/cursor-follower/demo.html',
    code: `/* → cursor‑follower code (copy‑paste) */
.cursor{
  width:30px;height:30px;border:2px solid #fff;
  border-radius:50%;position:fixed;pointer-events:none;
  transform:translate(-50%,-50%);transition:.1s;
}
.cursor.hover{width:50px;height:50px;background:rgba(255,255,255,.15);}
body, a, button{cursor:none;}`,
    description:`A little circle follows the mouse with a smooth delay.
Add the CSS, a `<div class="cursor" id="cursor"></div>` and the short JS below.`

  },
  {
    id:'text-reveal',
    title:'Text Reveal',
    category:'text',
    thumb:'https://raw.githubusercontent.com/ailanaz/simplenocode/main/snippets/text-reveal/demo.html',
    demo:'snippets/text-reveal/demo.html',
    code:`/* → text‑reveal code (copy‑paste) */
.reveal{opacity:0;transform:translateY(30px);transition:.8s;}
.reveal.visible{opacity:1;transform:translateY(0);}
const obs = new IntersectionObserver((e)=>e.forEach(i=>{if(i.isIntersecting)i.target.classList.add('visible')}),{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));`,
    description:`Elements fade in and slide up when they enter the viewport. Just add class “reveal” to any element.`
  },
  {
    id:'hover-buttons',
    title:'Hover Buttons',
    category:'buttons',
    thumb:'https://raw.githubusercontent.com/ailanaz/simplenocode/main/snippets/hover-buttons/demo.html',
    demo:'snippets/hover-buttons/demo.html',
    code:`/* → hover‑buttons code (copy‑paste) */
.btn{padding:1rem 2rem;border:none;border-radius:8px;cursor:pointer;transition:.3s;}
.btn-glow{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;}
.btn-glow:hover{box-shadow:0 0 30px rgba(102,126,234,.5);transform:translateY(-2px);}`,
    description:`Three button styles (glow, fill, slide) that react on hover. Perfect for CTA’s.`
  }
  // 👉 Add the rest of your 5 snippets here (same shape)
];

/* --------------------------------------------------------------
   2️⃣  BUILD CARD LIST
   ------------------------------------------------------------ */
const cardContainer=document.getElementById('cardList');

function buildCards(filter='all'){
  cardContainer.innerHTML='';
  const list = snippets.filter(s=>filter==='all' || s.category===filter);
  list.forEach(s=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.id=s.id;
    card.dataset.cat=s.category;
    card.innerHTML=`
      <img src="${s.thumb}" alt="${s.title}">
      <div class="info">
        <h3>${s.title}</h3>
        <span class="tag">${s.category}</span>
      </div>`;
    card.addEventListener('click',()=>loadSnippet(s.id));
    cardContainer.appendChild(card);
  });
}

/* --------------------------------------------------------------
   3️⃣  LOAD SELECTED SNIPPET INTO PANES
   ------------------------------------------------------------ */
function loadSnippet(id){
  const sn=snippets.find(o=>o.id===id);
  if(!sn) return;
  // preview
  document.getElementById('demoFrame').src=sn.demo;
  // code
  document.getElementById('codeBlock').textContent=sn.code;
  // description
  document.getElementById('descBox').innerHTML=`<h3>${sn.title}</h3><p>${sn.description}</p>`;
}

/* --------------------------------------------------------------
   4️⃣  COPY CODE TO CLIPBOARD
   ------------------------------------------------------------ */
function copyCode(){
  const txt=document.getElementById('codeBlock').textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    alert('Code copied to clipboard!');
  });
}

/* --------------------------------------------------------------
   5️⃣  NAV BUBBLES – filter cards
   ------------------------------------------------------------ */
document.querySelectorAll('.bubble').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.bubble').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    buildCards(b.dataset.cat);
  });
});

/* --------------------------------------------------------------
   6️⃣  MAP CAROUSEL – rotating preview thumbnails
   ------------------------------------------------------------ */
let carouselIdx=0;
const carouselImg=document.getElementById('carouselImg');
function rotateCarousel(){
  const sn=snippets[carouselIdx%snippets.length];
  carouselImg.src=sn.thumb;
  carouselIdx++;
}
setInterval(rotateCarousel,5000); // change every 5 s
rotateCarousel();

/* --------------------------------------------------------------
   7️⃣  INITIAL LOAD
   ------------------------------------------------------------ */
buildCards();          // show all cards
if(snippets.length) loadSnippet(snippets[0].id); // load first by default
</script>

</body>
</html>
